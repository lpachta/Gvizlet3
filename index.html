<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gvizlet</title>
  <link rel="stylesheet" href="karta.css">
</head>

<body class="index-view">
  <nav class="view-switch">
    <a href="index.html" class="nav-link active">📖 Prohlížení</a>
    <a href="test.html" class="nav-link">🧠 Testování</a>
  </nav>

  <div class="quiz-container">
    <div class="card">
      <div class="card-inner" id="cardInner">
        <div class="card-front">
          <img id="fImg" src="" alt="">
          <h2 id="fText">Načítání...</h2>
        </div>
        <div class="card-back">
          <img id="bImg" src="" alt="">
          <h2 id="bText">...</h2>
        </div>
      </div>
    </div>

    <div class="controls">

      <div class="navigation-row">
        <button onclick="prevCard()" class="nav-btn">⬅</button>
        <span id="starBtn" class="star-icon" onclick="toggleStar()">★</span>
        <button onclick="nextCard()" class="nav-btn">➡</button>
      </div>
      <div id="counter" class="counter-display">0 / 0</div>

      <div class="options-row">
        <button id="shuffleBtn" class="shuffle-btn" onclick="toggleShuffle()">➡️ Pořadí</button>
        <button id="filterBtn" class="filter-btn" onclick="toggleFilter()">📁 Vše</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="database_service.js"></script>
</body>

</html>
