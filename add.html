  <div id="add-card-view">
    <form action="upload.php" method="post" enctype="multipart/form-data">
      <div class="card-form">
        <h2>Nová kartička</h2>
        
        <div class="input-group">
            <label for="frontText">Přední strana (Text):</label>
            <input type="text" name="frontText" placeholder="Pojem">

            <input type="file" name="frontImg" id="frontImg" accept="image/*">

            <label for="backText">Zadní strana (Odpověď):</label>
            <input type="text" name="backText" placeholder="Definice">

            <input type="file" name="backImg" id="backImg" accept="image/*">
        </div>

        <div class="button-row">
            <button type="submit" name="submit" id="save-card-btn" class="nav-btn btn-right">💾 Uložit</button>
            <button type="button" id="cancel-add-btn" class="nav-btn btn-wrong">❌ Zrušit</button>
        </div>
      </div>
