<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testovací mód</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="karta.css">
</head>

<body class="test-view">
  <nav class="view-switch">
    <a href="index.html" class="nav-link">📖 Prohlížení</a>
    <a href="test.html" class="nav-link active">🧠 Testování</a>
    <a href="add.html" class="nav-link">+ Přidání karty</a>
  </nav>

  <div class="quiz-container">
    <div id="finish-message" style="display:none; text-align:center;">
      <h2>Vše hotovo! 🎉</h2>
      <button id="reload-btn" class="nav-btn"
        style="width:auto; padding:0 20px; border-radius:12px; margin: 0 auto;">Zkusit znovu</button>
      <br><br>
      <a href="index.html" style="color: #2563eb; text-decoration: none; font-weight: 600;">Zpět na prohlížení</a>
    </div>

    <div id="quiz-content">
      <div class="card">
        <div class="card-inner" id="cardInner">
          <div class="card-front">
            <img id="fImg" src="">
            <h2 id="fText"></h2>
          </div>
          <div class="card-back">
            <img id="bImg" src="">
            <h2 id="bText"></h2>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="navigation-row">
          <button id="btn-wrong" class="nav-btn btn-wrong">❌</button>
          <span id="starBtn" class="star-icon" ">★</span>
          <button id="btn-right" class="nav-btn btn-right">✅</button>
        </div>
        <div id="counter" class="counter-display">0 zbývá</div>


        <div class="options-row">
          <button id="shuffleBtn" class="shuffle-btn" ">➡️ Pořadí</button>
          <button id="filterBtn" class="filter-btn" ">📁 Vše</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>

</html>
